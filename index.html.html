    <!DOCTYPE html>
<html>
<head>
    <title>login - DEMOMARKETSHOP -Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">     
    <style>
      * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  
      body {
        background: #0a0a0a;
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      
      .login-box {
        background: #141420;
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 0 30px rgba(0, 255, 150, 0.1);
        text-align: center;
      }          

      .logo {
        width: 70px;
        height: 70px;
        background: linear-gradiant(135deg, #00ff88, #8866ff);
        border-radius: 20px;
        margin: 0 auto 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 35px;
      } 
      .input-group {
      position: relative;
      margin: 20px 0; 
     }

      h1 {
        background: linear-gradient(90deg, #00ff88, #8866ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 28px;
        letter-spacing: 2px;
        margin-bottom: 5px;
      }

      .subtitle {
        color: #888;
        font-size: 13px;
        margin-bottom: 30px;
      }   
       
      .imput-group input {
      width: 100%;
      padding: 12px 40px; 
      background: #222;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      }

      .input-group {
        text-align: left;
        margin-bottom: 20px;
      }

      .input-group label{
        display: block;
        font-size: 12px
        color: #aaa;
        margin-bottom: 8px;
        letter-spacing: 1px
      } 

     .input-group i{
       position: absolute;
       left: 15px;
       top: 50%;
       transform: translateY(-50%);
       font-size: 18px;
       color: #888
     }
     #togglePassword {
      right: 15px;
      left: auto;
      cursor: pointer;
     }

      button {
      width: 100%;
      padding: 15px;
      background: #00ff88;
      border: none;
      border-radius: 12px;
      color: black;
      font-weight: bold;
      font-size: 16px 
      cursor: pointer;
      margin-top: 18px;
    }

    button:hover {opacity: 0.8;}
    
    .link a:hover {
      background: #00ff88;
     color: black
    }
    
    .link a {
      color: #00ff88;
      text-decoration: none;
      border: 2px solid #00ff88;
      padding: 8px 20px;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
    }
    </style>
  </head>

  <body>
    <div class="login-box">
      <div class="logo">✈️</div>
      <h1>DEMOMARKETSHOP</h1>
      <p class="subtitle">secure Acess Portal</p>

      <form>
      <div class="input-group">
      <label>EMAIL ADDRESS</label>
      <span>📧</span>
      <input type="email"  id="email"placeholder="Enter your mail" required>
      </div>
       
      <div class="input-group">
      <label>PASSWORD</label>
      <span>🔒</span>
      <input type="password" placeholder="Enter your password" id="password" required> 
      <span id="togglePassword" style=cursor:pointer'>👁️</span>
      </div>
      
      <button type="button" onclick="window.location.href='dashboard.html'">LOGIN</
      button>

      <p>Don't have account? <a href="register.html">Sign Up</a></p>      
      
      <script>
      document.getElementById('togglePassword').onclick = function() {
          let pass = document.getElementById('password');
          pass.type = pass.type === 'password' ? 'text' : 'password';
          this.classList.toggle('fa-eye-slash');
      };
     
      document.querySelector('form').onsubmit = function(e) {
          e.preventDefault();  
          let email = document.getElementById('email').value;
          let password = document.getElementById('password').value;

          if(email.includes('@') && password.length >= 6) {
              alert('Login successful! Welcome: " + email);
              window.location.href = "dashboard.html";
          } else {
              alert("Enter valid email + password 6+ characters");
           }  
      };
      </script>
