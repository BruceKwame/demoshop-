<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKMARKET - Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:’Orbitron’,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#080812;
    background-image:
    radial-gradient(circle at top left,#003d3d 0%,transparent 40%),
    radial-gradient(circle at bottom right,#2c1057 0%,transparent 40%);
}

.container{
    width:420px;
    background:#12121f;
    border-radius:35px;
    padding:40px 30px;
    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 20px rgba(0,255,255,.08),
    0 0 60px rgba(0,255,255,.05);
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo-box{
    width:120px;
    height:120px;
    margin:auto;

    border-radius:32px;

    background:linear-gradient(
    135deg,
    #00ffd5,
    #3ddcff,
    #785bff,
    #00ff99);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:60px;
    color:#000;

    box-shadow:
    0 0 15px rgba(0,255,255,.4),
    0 0 35px rgba(0,255,200,.3),
    0 0 60px rgba(120,91,255,.3);
}

.brand{
    margin-top:25px;
    font-size:40px;
    font-weight:700;
    letter-spacing:3px;

    background:linear-gradient(
    to right,
    #00ffd5,
    #4fe0ff,
    #9c7dff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:10px;
    color:#8b8ba5;
    font-size:13px;
    letter-spacing:1px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:10px;

    color:#fff;
    font-size:13px;
    letter-spacing:2px;
}

.input-box{
    width:100%;
    padding:18px;

    background:#1a1a2f;
    color:white;

    border:2px solid #2b2b45;
    border-radius:18px;

    outline:none;
    transition:.3s;
}

.input-box:focus{
    border-color:#00ffd5;

    box-shadow:
    0 0 10px rgba(0,255,200,.2);
}

.btn{
    width:100%;
    margin-top:30px;

    padding:18px;

    border:none;
    border-radius:18px;

    background:linear-gradient(
    90deg,
    #00ffb3,
    #00ff8c);

    color:#000;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 0 25px rgba(0,255,140,.5);
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:#8b8ba5;
    font-size:13px;
}

.login-link a{
    color:#00ffd5;
    text-decoration:none;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">

<div class="logo-box">
            ✈
</div>

<h1 class=”brand”>
            DEMOMARKET
</h1>

<p class=”subtitle”>
            Secure Access Portal
</p>

</div>

<form onsubmit="return checkLogin()">

<label>EMAIL ADDRESS</label>
<input type="email"
               class="input-box"
               placeholder="Enter your email"
               required>

<label>PASSWORD</label>
<input type=”password"
               class="input-box"
               placeholder="Enter your password"
               required>

<label>AUTH KEY</label>
<input type="text" id="authkey"
               class="input-box"
               placeholder="Enter auth key">

<button type="submit" class="btn">
            CREATE ACCOUNT
</button>

</form>

<div class="login-link">
        Already have an account?
    </div>  
</div>

<script>
function checkLogin() {
   const key = document.getElementById('authkey').value;
   if(key === 'Sch555') {
     window.location.href = 'dashboard.html';
     return false;
 } else {
    alert('Wrong Auth Key');
    return false;
   }
}
</script>

</body>
</html>
